<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — BuildWatch AI</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .error-card {
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
      padding: 60px 48px;
      max-width: 480px;
      width: 100%;
    }

    .error-code {
      font-size: 6rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .error-title {
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-primary);
    }

    .error-desc {
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin-bottom: 32px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main class="error-page">
    <div class="error-card animate-in">
      <div class="error-code">404</div>
      <h1 class="error-title">Page not found</h1>
      <p class="error-desc">The page or analysis you are looking for doesn't exist or has been moved.</p>
      <a href="/" class="btn btn-primary">Return to analysis</a>
    </div>
  </main>
</body>
</html>
