<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Server Error — BuildWatch AI</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .error-card {
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
      padding: 60px 48px;
      max-width: 480px;
      width: 100%;
    }

    .error-icon {
      width: 56px;
      height: 56px;
      border-radius: var(--radius-lg);
      background: var(--danger-bg);
      border: 1px solid rgba(239, 68, 68, 0.2);
      display: grid;
      place-items: center;
      margin: 0 auto 24px;
      color: var(--danger);
    }

    .error-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--danger);
    }

    .error-desc {
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin-bottom: 32px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main class="error-page">
    <div class="error-card animate-in">
      <div class="error-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      </div>
      <h1 class="error-title">System error</h1>
      <p class="error-desc">An internal server error occurred while processing your request. Please try again in a moment.</p>
      <a href="/" class="btn btn-secondary">Try again</a>
    </div>
  </main>
</body>
</html>
