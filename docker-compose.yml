version: '3.8'

services:
  buildwatch:
    build: .
    container_name: buildwatch_app
    ports:
      - "5000:5000"
    volumes:
      # Mount volumes to persist uploaded images and generated analysis reports
      - ./static/analyses:/app/static/analyses
      - ./uploads:/app/uploads
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=False
      - PORT=5000
      - HOST=0.0.0.0
    restart: unless-stopped
